<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wallpaper Gallery</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 20px;
            background-color: #f5f5f5;
        }

        h2 {
            margin-bottom: 10px;
        }

        input {
            padding: 10px;
            width: 60%;
            max-width: 500px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
        }

        button {
            padding: 10px 15px;
            cursor: pointer;
            border: none;
            background-color: #333;
            color: white;
            border-radius: 6px;
            margin-left: 5px;
        }

        button:hover {
            background-color: #555;
        }

        .status {
            font-size: 16px;
            margin: 10px;
            color: #666;
        }

        .error {
            color: red;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .card {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }

        .card:hover {
            transform: scale(1.04);
        }

        .card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .card p {
            font-size: 12px;
            padding: 5px;
            word-break: break-all;
        }
    </style>
</head>
<body>

    <h2>🖼️ GitHub Wallpaper Gallery</h2>

    <input type="text" id="repoUrl" placeholder="https://github.com/user/repo or /tree/branch" />
    <button onclick="fetchImages()">Load Images</button>

    <p id="status" class="status"></p>

    <div class="gallery" id="imageGallery"></div>

    <script>
        async function fetchImages() {
            const repoUrl = document.getElementById("repoUrl").value.trim();
            const gallery = document.getElementById("imageGallery");
            const status = document.getElementById("status");

            gallery.innerHTML = "";
            status.className = "status";

            if (!repoUrl) {
                alert("Enter a GitHub repository URL");
                return;
            }

            // ✅ Extract owner, repo, branch (if present)
            const match = repoUrl.match(/github\.com\/([^\/]+)\/([^\/]+)(?:\/tree\/([^\/]+))?/);

            if (!match) {
                alert("Invalid GitHub URL");
                return;
            }

            const owner = match[1];
            const repo = match[2];
            const branch = match[3] || "main";

            console.log(`Using repo: ${owner}/${repo} @ ${branch}`);

            try {
                status.textContent = "🔄 Fetching branch info...";

                // ✅ Step 1: Get branch info → tree SHA
                const branchRes = await fetch(
                    `https://api.github.com/repos/${owner}/${repo}/branches/${branch}`
                );

                if (!branchRes.ok) throw new Error("Branch not found");

                const branchData = await branchRes.json();
                const treeSha = branchData.commit.commit.tree.sha;

                // ✅ Step 2: Fetch full recursive tree
                status.textContent = "📂 Fetching files recursively...";

                const treeRes = await fetch(
                    `https://api.github.com/repos/${owner}/${repo}/git/trees/${treeSha}?recursive=1`
                );

                if (!treeRes.ok) throw new Error("Failed to fetch repo tree");

                const treeData = await treeRes.json();
                const files = treeData.tree;

                const imageExtensions = [".jpg", ".jpeg", ".png", ".gif", ".webp"];
                let count = 0;

                status.textContent = "🖼️ Rendering images...";

                files.forEach(file => {
                    if (
                        file.type === "blob" &&
                        imageExtensions.some(ext =>
                            file.path.toLowerCase().endsWith(ext)
                        )
                    ) {
                        count++;

                        // ✅ Encode path (fixes broken images)
                        const encodedPath = encodeURIComponent(file.path).replace(/%2F/g, "/");

                        const imgUrl = `https://raw.githubusercontent.com/${owner}/${repo}/${branch}/${encodedPath}`;
                        const githubUrl = `https://github.com/${owner}/${repo}/blob/${branch}/${file.path}`;

                        const card = document.createElement("div");
                        card.className = "card";

                        const link = document.createElement("a");
                        link.href = githubUrl;
                        link.target = "_blank";

                        const img = document.createElement("img");
                        img.src = imgUrl;
                        img.loading = "lazy";

                        // ✅ Debug broken images
                        img.onerror = () => {
                            console.log("Failed to load:", imgUrl);
                        };

                        const caption = document.createElement("p");
                        caption.textContent = file.path;

                        link.appendChild(img);
                        card.appendChild(link);
                        card.appendChild(caption);

                        gallery.appendChild(card);
                    }
                });

                if (treeData.truncated) {
                    status.textContent = `⚠️ Repo too large. Partial results (${count} images)`;
                } else if (count === 0) {
                    status.textContent = "❌ No images found.";
                } else {
                    status.textContent = `✅ Loaded ${count} images`;
                }

            } catch (err) {
                console.error(err);
                status.textContent = "❌ Error loading images.";
                status.classList.add("error");
            }
        }
    </script>

</body>
</html>
